spring:
  datasource:
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

# Security configuration for tests (issuer set to self if testing OIDC handshake)
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080
